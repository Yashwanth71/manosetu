<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0C1120; padding: 24px 20px; }
  .row { margin-bottom: 18px; display: flex; align-items: baseline; gap: 12px; }
  .specimen { color: #F0F4FF; font-family: 'Syne', system-ui, sans-serif; line-height: 1.2; }
  .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: #4B5A72; white-space: nowrap; min-width: 120px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0 16px; }
  .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #4B5A72; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="label">Syne — Display & Headings</div>

<div class="row">
  <div class="meta">3xl · 32px · 800</div>
  <div class="specimen" style="font-size:32px;font-weight:800;letter-spacing:-0.02em">Bridge to the Mind</div>
</div>
<div class="row">
  <div class="meta">2xl · 26px · 700</div>
  <div class="specimen" style="font-size:26px;font-weight:700;letter-spacing:-0.02em">Your Wellness Journey</div>
</div>
<div class="row">
  <div class="meta">xl · 22px · 700</div>
  <div class="specimen" style="font-size:22px;font-weight:700">Today's Check-In</div>
</div>
<div class="row">
  <div class="meta">lg · 19px · 600</div>
  <div class="specimen" style="font-size:19px;font-weight:600">Breathing Sessions</div>
</div>
<div class="divider"></div>
<div class="row">
  <div class="meta">CTA · 15px · 700</div>
  <div class="specimen" style="font-size:15px;font-weight:700;letter-spacing:0.03em;background:linear-gradient(135deg,#3B82F6,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:4px 0">Start Session</div>
</div>
</body>
</html>
