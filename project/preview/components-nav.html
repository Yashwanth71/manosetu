<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0C1120; padding: 20px; font-family: 'DM Sans', sans-serif; color: #F0F4FF; }
  .label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #4B5A72; margin-bottom: 10px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 16px 0; }

  /* ── Top App Bar ── */
  .top-bar {
    background: #111827; border-radius: 16px 16px 0 0;
    padding: 12px 18px; display: flex; align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(255,255,255,0.06); border-bottom: none;
  }
  .top-bar-left { display: flex; align-items: center; gap: 9px; }
  .top-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg,#3B82F6,#7C3AED); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .top-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .top-greeting { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: #F0F4FF; }
  .top-sub { font-size: 10px; color: #8B9CB8; margin-top: 1px; }
  .top-actions { display: flex; gap: 6px; }
  .top-icon-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* ── Bottom Nav shell ── */
  .nav-shell {
    background: rgba(17,24,39,0.98);
    border: 1px solid rgba(255,255,255,0.06);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 8px 0 10px;
    backdrop-filter: blur(24px);
  }
  .nav-row { display: flex; align-items: flex-start; }

  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 4px 0; cursor: pointer; border: none; background: none;
    position: relative; min-height: 52px; justify-content: flex-start;
    transition: opacity 0.15s;
  }

  /* Active indicator — pill above icon */
  .nav-pill {
    width: 28px; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg,#3B82F6,#7C3AED);
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    opacity: 0; transition: opacity 0.2s, width 0.2s;
  }
  .nav-tab.active .nav-pill { opacity: 1; width: 32px; }

  .nav-icon-wrap { position: relative; display: flex; align-items: center; justify-content: center; width: 32px; height: 28px; }

  /* Icon colors */
  .nav-tab svg { transition: stroke 0.2s, fill 0.2s; }
  .nav-tab.active svg.stroke-icon { stroke: #7C3AED; }
  .nav-tab.active svg.fill-icon path { fill: #7C3AED; }
  .nav-tab:not(.active) svg.stroke-icon { stroke: #4B5A72; }

  /* Manas center button — elevated */
  .nav-manas-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 0 4px; cursor: pointer; border: none; background: none;
    position: relative; top: -14px;
  }
  .nav-manas-btn {
    width: 50px; height: 50px; border-radius: 18px;
    background: linear-gradient(135deg,#3B82F6,#7C3AED);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(124,58,237,0.45);
    border: 2px solid rgba(255,255,255,0.12);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .nav-manas-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(124,58,237,0.55); }
  .nav-manas-btn.active { box-shadow: 0 4px 24px rgba(124,58,237,0.7); }
  .nav-manas-label { font-size: 9px; font-weight: 500; color: #4B5A72; margin-top: 2px; }
  .nav-manas-wrap.active .nav-manas-label { color: #C4B5FD; }

  .nav-label { font-size: 9px; font-weight: 500; color: #4B5A72; line-height: 1; }
  .nav-tab.active .nav-label { color: #C4B5FD; }

  /* ── States showcase ── */
  .states-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
  .state-card { background: #111827; border-radius: 10px; padding: 10px 8px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .state-name { font-family: 'DM Mono', monospace; font-size: 8px; color: #4B5A72; text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Icon docs ── */
  .icon-docs { display: flex; gap: 8px; flex-wrap: wrap; }
  .icon-doc { background: #111827; border-radius: 10px; padding: 10px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 72px; flex: 1; }
  .icon-doc-name { font-size: 9px; color: #8B9CB8; text-align: center; }
  .icon-doc-ref { font-family: 'DM Mono', monospace; font-size: 8px; color: #4B5A72; }
</style>
</head>
<body>

<!-- ── Top app bar ── -->
<div class="label">Top App Bar</div>
<div class="top-bar">
  <div class="top-bar-left">
    <div class="top-avatar">
      <img src="../assets/logo-actual.png" alt="avatar">
    </div>
    <div>
      <div class="top-greeting">Good morning, Priya</div>
      <div class="top-sub">Monday · 12 May</div>
    </div>
  </div>
  <div class="top-actions">
    <div class="top-icon-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B9CB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><circle cx="18" cy="5" r="3" fill="#7C3AED" stroke="none"/></svg>
    </div>
    <div class="top-icon-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B9CB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
</div>

<!-- ── Main nav (interactive) ── -->
<div class="nav-shell">
  <div class="nav-row" id="mainNav">

    <!-- Home — arch/gateway icon -->
    <button class="nav-tab active" id="tab-home" onclick="activate('home')">
      <div class="nav-pill"></div>
      <div class="nav-icon-wrap">
        <svg class="stroke-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- Arch / gateway — "setu" (bridge) concept -->
          <path d="M3 21V10a9 9 0 0 1 18 0v11"/>
          <path d="M9 21v-6a3 3 0 0 1 6 0v6"/>
        </svg>
      </div>
      <span class="nav-label">Home</span>
    </button>

    <!-- Therapy — calendar with checkmark -->
    <button class="nav-tab" id="tab-therapy" onclick="activate('therapy')">
      <div class="nav-pill"></div>
      <div class="nav-icon-wrap">
        <svg class="stroke-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="3"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <path d="M9 16l2 2 4-4"/>
        </svg>
      </div>
      <span class="nav-label">Therapy</span>
    </button>

    <!-- Manas — elevated center lotus button -->
    <button class="nav-manas-wrap" id="tab-manas" onclick="activate('manas')">
      <div class="nav-manas-btn" id="manasBtnEl">
        <!-- Lotus/padma mark -->
        <img src="../assets/logo-actual.png" width="28" height="28" alt="Manas" style="border-radius:6px">
      </div>
      <span class="nav-manas-label" id="manasLbl">Manas</span>
    </button>

    <!-- Community — two users -->
    <button class="nav-tab" id="tab-community" onclick="activate('community')">
      <div class="nav-pill"></div>
      <div class="nav-icon-wrap">
        <svg class="stroke-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <span class="nav-label">Community</span>
    </button>

    <!-- Profile — person with circle -->
    <button class="nav-tab" id="tab-profile" onclick="activate('profile')">
      <div class="nav-pill"></div>
      <div class="nav-icon-wrap">
        <svg class="stroke-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="9" r="3"/>
          <path d="M6.2 19.4a6 6 0 0 1 11.6 0"/>
        </svg>
      </div>
      <span class="nav-label">Profile</span>
    </button>

  </div>
</div>

<div class="divider"></div>

<!-- ── Icon reference ── -->
<div class="label">Icon System — Sketch → Implementation</div>
<div class="icon-docs">

  <div class="icon-doc">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 21V10a9 9 0 0 1 18 0v11"/><path d="M9 21v-6a3 3 0 0 1 6 0v6"/>
    </svg>
    <div class="icon-doc-name">Home<br>Gateway arch</div>
    <div class="icon-doc-ref">setu = bridge</div>
  </div>

  <div class="icon-doc" style="border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.07)">
    <img src="../assets/logo-actual.png" width="28" height="28" style="border-radius:6px;box-shadow:0 2px 12px rgba(124,58,237,0.4)">
    <div class="icon-doc-name">Manas<br>Lotus mark</div>
    <div class="icon-doc-ref">elevated CTA</div>
  </div>

  <div class="icon-doc">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/>
    </svg>
    <div class="icon-doc-name">Therapy<br>Session book</div>
    <div class="icon-doc-ref">calendar + ✓</div>
  </div>

  <div class="icon-doc">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <div class="icon-doc-name">Community</div>
    <div class="icon-doc-ref">users group</div>
  </div>

  <div class="icon-doc">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="9" r="3"/><path d="M6.2 19.4a6 6 0 0 1 11.6 0"/>
    </svg>
    <div class="icon-doc-name">Profile<br>Person + circle</div>
    <div class="icon-doc-ref">contained user</div>
  </div>

</div>

<script>
function activate(id) {
  // Regular tabs
  ['home','therapy','community','profile'].forEach(k => {
    const tab = document.getElementById('tab-'+k);
    if (!tab) return;
    tab.classList.toggle('active', k === id);
  });
  // Manas special button
  const manasWrap = document.getElementById('tab-manas');
  const manasBtn  = document.getElementById('manasBtnEl');
  const manasLbl  = document.getElementById('manasLbl');
  if (id === 'manas') {
    manasWrap.classList.add('active');
    manasBtn.style.boxShadow = '0 4px 28px rgba(124,58,237,0.75)';
    manasLbl.style.color = '#C4B5FD';
  } else {
    manasWrap.classList.remove('active');
    manasBtn.style.boxShadow = '0 4px 20px rgba(124,58,237,0.45)';
    manasLbl.style.color = '#4B5A72';
  }
}
</script>
</body>
</html>
