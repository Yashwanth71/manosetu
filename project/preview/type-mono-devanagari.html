<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0C1120; padding: 24px 20px; }
  .row { margin-bottom: 16px; display: flex; align-items: baseline; gap: 12px; }
  .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: #4B5A72; white-space: nowrap; min-width: 130px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0 16px; }
  .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #4B5A72; margin-bottom: 12px; }
  .technique-row { display: flex; align-items: center; gap: 10px; background: #111827; border-radius: 12px; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px; }
  .deva { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 17px; font-weight: 500; color: #C4B5FD; }
  .roman { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #8B9CB8; }
</style>
</head>
<body>
<div class="label">DM Mono — Code & Technical</div>
<div class="row">
  <div class="meta">mono · 13px · 400</div>
  <div style="font-family:'DM Mono',monospace;font-size:13px;color:#4B5A72">SID-4F2A9B · PHQ-9 · GAD-7</div>
</div>
<div class="row">
  <div class="meta">mono · 11px · 400</div>
  <div style="font-family:'DM Mono',monospace;font-size:11px;color:#4B5A72;letter-spacing:0.05em">STREAK_DAY_07 · XP+50</div>
</div>

<div class="divider"></div>
<div class="label">Noto Sans Devanagari — Sanskrit Terms</div>

<div class="technique-row">
  <div>
    <div class="deva">नाड़ी शोधन</div>
    <div class="roman">Nadi Shodhana · Alternate Nostril</div>
  </div>
</div>
<div class="technique-row">
  <div>
    <div class="deva">भस्त्रिका</div>
    <div class="roman">Bhastrika · Bellows Breath</div>
  </div>
</div>
<div class="technique-row">
  <div>
    <div class="deva">उज्जायी</div>
    <div class="roman">Ujjayi · Ocean Breath</div>
  </div>
</div>
</body>
</html>
